version: "3.9"

# =============================================
# TourismRAG Docker Compose
# 服务：mysql | etcd | minio | milvus | backend | frontend
# 启动：docker compose --env-file .env up --build -d
# =============================================

services:
  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: tourism-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tourism-net

  # ---- Milvus 依赖：etcd ----
  etcd:
    container_name: tourism-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tourism-net

  # ---- Milvus 依赖：MinIO ----
  minio:
    container_name: tourism-minio
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - tourism-net

  # ---- Milvus 向量数据库 ----
  milvus:
    container_name: tourism-milvus
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - tourism-net

  # ---- Spring Boot 后端 ----
  backend:
    container_name: tourism-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION_NAME: tourism_knowledge_v2
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY}
      # ---- 智能行程 Agent ----
      MAP_API_KEY: ${MAP_API_KEY:-}
      AGENT_POI_FALLBACK_ORDER: ${AGENT_POI_FALLBACK_ORDER:-gaode,rag,mock}
      AGENT_POI_RAG_ENABLED: ${AGENT_POI_RAG_ENABLED:-true}
      AGENT_ENABLED: ${AGENT_ENABLED:-true}
      AGENT_TIMEOUT_MS: ${AGENT_TIMEOUT_MS:-8000}
      FOOD_MIN_RATING: ${FOOD_MIN_RATING:-4.0}
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - tourism-net
    restart: unless-stopped

  # ---- Vue 3 前端（Nginx） ----
  frontend:
    container_name: tourism-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://tourisim-api.zood.work}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_CODE: ${VITE_AMAP_SECURITY_CODE:-}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - tourism-net
    restart: unless-stopped

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  tourism-net:
    driver: bridge
